<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("felix:theme");
          const prefersDark = matchMedia("(prefers-color-scheme: dark)").matches;
          const isDark = stored === "dark" || ((stored === null || stored === "system") && prefersDark);
          document.documentElement.classList.toggle("dark", isDark);
        } catch {
          /* ignore */
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap"
      rel="stylesheet"
    />
    <title>Felix</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
