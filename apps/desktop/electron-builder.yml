appId: ai.felix.app
productName: Felix
copyright: Copyright © 2026 Felix
artifactName: ${productName}-${version}-${arch}.${ext}

publish:
  provider: github
  owner: ambrosecltr
  repo: Felix

directories:
  output: release
  buildResources: resources

afterPack: scripts/copy-agent-after-pack.cjs

# The app runs from dist/ (built by electron-vite). Bundle the built main,
# preload, and renderer, plus package.json for the "main" entry. The PI agent
# is NOT pulled from here: the workspace's bun store uses symlinks that don't
# survive packaging, so we ship a dedicated flat install under resources/agent.
files:
  - dist/**/*
  - package.json
  - "!node_modules/**"
  - "!**/*.map"

# Ship the bundled standalone Node + bun runtimes, the self-contained PI agent
# install (with its full dependency tree), and the icon as plain on-disk files
# (extraResources lands outside the asar, so Node resolves the agent's deps
# normally and the binaries are directly executable). Felix uses icon.png at
# runtime for BrowserWindow/dock icons; icon.icns is for the .app bundle.
extraResources:
  - from: resources/node
    to: node
  - from: resources/bun
    to: bun
  - from: resources/agent
    to: agent
  - from: resources/native
    to: native
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.icns
    to: icon.icns

mac:
  category: public.app-category.education
  icon: resources/icon.icns
  hardenedRuntime: true
  forceCodeSigning: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  # electron-builder picks up the Developer ID certificate from CSC_LINK /
  # CSC_KEY_PASSWORD or CSC_NAME. Release packaging fails without one; use
  # `bun run package:unsigned` for local packaging that intentionally skips
  # signing and notarization.

dmg:
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications
